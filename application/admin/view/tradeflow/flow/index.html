<div class="panel panel-default panel-intro">
    <div class="panel-heading">
        {:build_heading(null,FALSE)}
        <ul class="nav nav-tabs" data-field="status">
            <li class="{:$Think.get.status === null ? 'active' : ''}"><a href="#t-all" data-value="" data-toggle="tab">{:__('All')}</a></li>
            {foreach name="statusList" item="vo"}
            <li class="{:$Think.get.status === (string)$key ? 'active' : ''}"><a href="#t-{$key}" data-value="{$key}" data-toggle="tab">{$vo}</a></li>
            {/foreach}
        </ul>
    </div>
    <div class="panel-body">
        <div class="widget-body no-padding">
            <div id="toolbar" class="toolbar">
                <a href="javascript:;" class="btn btn-primary btn-refresh"><i class="fa fa-refresh"></i></a>
                <a href="javascript:;" class="btn btn-success btn-add {:$auth->check('tradeflow/flow/add')?'':'hide'}"><i class="fa fa-plus"></i> {:__('Add')}</a>
                <a href="javascript:;" class="btn btn-success btn-edit btn-disabled disabled {:$auth->check('tradeflow/flow/edit')?'':'hide'}"><i class="fa fa-pencil"></i> {:__('Edit')}</a>
                <a href="javascript:;" class="btn btn-danger btn-del btn-disabled disabled {:$auth->check('tradeflow/flow/del')?'':'hide'}"><i class="fa fa-trash"></i> {:__('Delete')}</a>
                <a href="javascript:;" class="btn btn-warning btn-batch-assign btn-disabled disabled"><i class="fa fa-share"></i> 批量分配</a>
            </div>
            <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                   data-operate-edit="{:$auth->check('tradeflow/flow/edit')}"
                   data-operate-del="{:$auth->check('tradeflow/flow/del')}"
                   width="100%"></table>
        </div>
    </div>
</div>
