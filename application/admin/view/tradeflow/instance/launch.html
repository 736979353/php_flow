<form id="launch-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">流程:</label>
        <div class="col-xs-12 col-sm-8"><p class="form-control-static">{$flow.name|htmlentities}</p></div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">标题:</label>
        <div class="col-xs-12 col-sm-8"><input name="row[title]" class="form-control" data-rule="required" type="text"></div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">额外抄送:</label>
        <div class="col-xs-12 col-sm-8">
            <select name="cc_ids[]" class="form-control selectpicker" multiple data-live-search="true">
                {foreach name="admins" item="admin"}
                <option value="{$admin.id|htmlentities}" {in name="admin.id" value="$defaultCcIds"}selected{/in}>{$admin.name|htmlentities} (ID:{$admin.id|htmlentities})</option>
                {/foreach}
            </select>
            <span class="help-block">这里选择的是本次流程实例的额外抄送人，不会修改流程设计模板。</span>
        </div>
    </div>
    {include file="tradeflow/instance/renderer" /}
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">发起</button>
        </div>
    </div>
</form>
